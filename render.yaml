services:
  - type: web
    name: eva-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

  - type: cron
    name: eva-ml-retrain
    env: python
    schedule: "0 3 * * *"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/scripts/retrain_models.py
