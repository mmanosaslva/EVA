<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVA — Sin conexión</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fdf2f8;
      color: #4a044e;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 1rem;
    }
    .card {
      background: white; border-radius: 1rem; padding: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      text-align: center; max-width: 400px;
    }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p { color: #6b21a8; font-size: 0.9rem; line-height: 1.5; }
    .btn {
      display: inline-block; margin-top: 1.5rem; padding: 0.5rem 1.5rem;
      background: #ec4899; color: white; border: none; border-radius: 0.5rem;
      font-size: 0.9rem; cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: #db2777; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌙</div>
    <h1>Sin conexión a internet</h1>
    <p>No te preocupes — tus datos se guardan de forma local y se sincronizarán cuando vuelvas a estar en línea.</p>
    <p style="margin-top:0.75rem;font-size:0.8rem;color:#a21caf;">
      Mientras tanto, puedes seguir registrando tus síntomas y ciclos.
    </p>
    <button class="btn" onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
